<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jubilados &#8212; Redefinir Senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/design-system.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
    .bg-orb { position:fixed; border-radius:50%; pointer-events:none; filter:blur(80px); z-index:0; }
    .bg-orb-1 { width:400px;height:400px;background:hsl(158,84%,48%,0.08);top:-100px;left:-120px; }
    .bg-orb-2 { width:300px;height:300px;background:hsl(190,95%,55%,0.06);bottom:-60px;right:-80px; }
    .card { position:relative; z-index:1; background:hsl(222,26%,9%,0.75); backdrop-filter:blur(28px); max-width:420px; }
    .card::before { content:''; position:absolute; inset:0; padding:1px; border-radius:inherit; background:var(--grad-border);
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
    h1 { margin:0 0 8px; font-size:1.4rem; }
    p.sub { margin:0 0 24px; color:var(--muted); font-size:.9rem; }
    .msg { margin-top:14px; padding:10px 14px; border-radius:var(--radius-xs); font-size:.9rem; border:1px solid transparent; }
    .msg.error   { background:var(--danger-sub);  color:var(--danger);  border-color:hsl(0,84%,60%,0.25); }
    .msg.success { background:var(--success-sub); color:var(--success); border-color:hsl(158,84%,48%,0.25); }
  </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="card">
  <h1>Redefinir Senha</h1>
  <p class="sub">Crie uma nova senha para sua conta Jubilados NF-e.</p>

  <div id="form-reset">
    <label>Nova senha <span style="color:var(--muted-dim);font-weight:400">(m&#237;nimo 6 caracteres)</span></label>
    <input type="password" id="nova-senha"    placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
    <label>Confirmar nova senha</label>
    <input type="password" id="conf-senha"    placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" />
    <button class="btn btn-primary btn-full btn-lg" id="btn-reset" onclick="resetarSenha()">Salvar nova senha</button>
  </div>

  <div id="msg" style="display:none" class="msg"></div>
</div>

<script>
  // Le o token da URL
  var params = new URLSearchParams(window.location.search);
  var token  = params.get('token');

  if (!token) {
    document.getElementById('form-reset').style.display = 'none';
    var el = document.getElementById('msg');
    el.textContent = 'Link invalido. Solicite um novo link de recuperacao de senha.';
    el.className = 'msg error'; el.style.display = '';
  }

  function mostrarMsg(txt, tipo) {
    var el = document.getElementById('msg');
    el.textContent = txt; el.className = 'msg ' + tipo; el.style.display = '';
  }

  async function resetarSenha() {
    var novaSenha = document.getElementById('nova-senha').value;
    var confSenha = document.getElementById('conf-senha').value;

    if (!novaSenha) { mostrarMsg('Digite a nova senha.', 'error'); return; }
    if (novaSenha.length < 6) { mostrarMsg('A senha deve ter ao menos 6 caracteres.', 'error'); return; }
    if (novaSenha !== confSenha) { mostrarMsg('As senhas nao coincidem.', 'error'); return; }

    var btn = document.getElementById('btn-reset');
    btn.disabled = true; btn.textContent = 'Salvando...';

    try {
      var res = await fetch('/api/auth/resetar-senha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, novaSenha: novaSenha })
      });
      var data = await res.json();
      if (!res.ok) {
        mostrarMsg(data.error || 'Erro ao redefinir senha.', 'error');
        btn.disabled = false; btn.textContent = 'Salvar nova senha';
        return;
      }
      document.getElementById('form-reset').style.display = 'none';
      mostrarMsg(data.message + ' Redirecionando para o login...', 'success');
      setTimeout(function() { window.location.href = '/login'; }, 2500);
    } catch(e) {
      mostrarMsg('Falha de rede. Tente novamente.', 'error');
      btn.disabled = false; btn.textContent = 'Salvar nova senha';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && token) resetarSenha();
  });
</script>
</body>
</html>
