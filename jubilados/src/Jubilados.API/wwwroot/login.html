<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jubilados &mdash; Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:       #060a16;
      --card-bg:  rgba(255,255,255,0.03);
      --card-border: rgba(255,255,255,0.08);
      --cyan:     #22d3ee;
      --purple:   #8b5cf6;
      --text:     rgba(255,255,255,0.92);
      --muted:    rgba(255,255,255,0.45);
      --input-bg: rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.12);
      --input-focus: rgba(14,165,233,0.35);
      --danger:   #f87171;
      --danger-bg: rgba(248,113,113,0.08);
      --success:  #34d399;
      --success-bg: rgba(52,211,153,0.08);
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background gradients */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 70%);
      top: -200px; left: -200px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 70%);
      bottom: -150px; right: -150px;
    }

    /* Back link */
    .back-to-home {
      position: fixed;
      top: 24px; left: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      z-index: 10;
      font-family: 'Inter', sans-serif;
    }
    .back-to-home:hover { color: var(--text); }
    .back-to-home svg { width: 14px; height: 14px; }

    /* Card */
    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 36px 32px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      z-index: 1;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 32px 64px rgba(0,0,0,0.4);
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-icon svg {
      width: 22px; height: 22px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .brand-text h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .brand-text p {
      margin: 3px 0 0;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Auth tabs */
    .auth-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.84rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
      background: transparent;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* Form elements */
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      display: block;
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #fff;
      box-shadow: 0 10px 24px rgba(139,92,246,0.32);
    }

    /* Forgot/back link */
    .link-action {
      display: block;
      text-align: right;
      font-size: 0.78rem;
      color: var(--cyan);
      cursor: pointer;
      margin-top: -8px;
      margin-bottom: 16px;
      transition: opacity 0.15s;
      background: none;
      border: none;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    .link-action:hover { opacity: 0.7; text-decoration: underline; }

    .back-link {
      display: block;
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      margin-top: 14px;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--cyan); }

    /* Messages */
    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.84rem;
      display: none;
      border: 1px solid transparent;
    }
    .msg.error   { background: var(--danger-bg);  color: var(--danger);  border-color: rgba(248,113,113,0.2); }
    .msg.success { background: var(--success-bg); color: var(--success); border-color: rgba(52,211,153,0.2); }

    .forgot-desc {
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <a href="/" class="back-to-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar
  </a>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Jubilados NF-e</h1>
        <p>Aurora Suite &middot; Sistema Fiscal</p>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="tab active" id="tab-login"    onclick="mostrarAba('login')">Entrar</button>
      <button class="tab"        id="tab-cadastro" onclick="mostrarAba('cadastro')">Cadastrar</button>
    </div>

    <!-- Login -->
    <div id="panel-login">
      <label>E-mail</label>
      <input type="email"    id="login-email" placeholder="seu@email.com" autocomplete="email" />
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" />
      <button class="link-action" onclick="mostrarAba('forgot')">Esqueci minha senha</button>
      <button class="btn btn-primary" id="btn-login" onclick="entrar()">Entrar</button>
    </div>

    <!-- Cadastro -->
    <div id="panel-cadastro" style="display:none">
      <label>E-mail</label>
      <input type="email"    id="cad-email"    placeholder="seu@email.com" autocomplete="email" />
      <label>Senha <span style="color:rgba(255,255,255,0.25);font-weight:400">(m&iacute;nimo 6 caracteres)</span></label>
      <input type="password" id="cad-senha"    placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="new-password" />
      <label>Confirmar senha</label>
      <input type="password" id="cad-confirma" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="new-password" />
      <button class="btn btn-primary" id="btn-cadastro" onclick="cadastrar()">Criar conta</button>
    </div>

    <!-- Recuperar senha -->
    <div id="panel-forgot" style="display:none">
      <p class="forgot-desc">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
      <label>E-mail cadastrado</label>
      <input type="email" id="forgot-email" placeholder="seu@email.com" autocomplete="email" />
      <button class="btn btn-primary" id="btn-forgot" onclick="recuperarSenha()">Enviar link de redefini&ccedil;&atilde;o</button>
      <button class="back-link" onclick="mostrarAba('login')">&larr; Voltar ao login</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

<script>
  (function() {
    var token = localStorage.getItem('jubilados_token');
    if (!token) return;
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(p) {
        if (p) window.location.href = p.onboardingConcluido ? '/operacoes/emitir-nfe' : '/onboarding';
      })
      .catch(function() {});
  })();

  function mostrarAba(aba) {
    document.getElementById('panel-login').style.display    = aba === 'login'    ? '' : 'none';
    document.getElementById('panel-cadastro').style.display = aba === 'cadastro' ? '' : 'none';
    document.getElementById('panel-forgot').style.display   = aba === 'forgot'   ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active',    aba === 'login');
    document.getElementById('tab-cadastro').classList.toggle('active', aba === 'cadastro');
    esconderMsg();
  }

  function mostrarMsg(txt, tipo) {
    var el = document.getElementById('msg');
    el.textContent = txt; el.className = 'msg ' + tipo; el.style.display = '';
  }
  function esconderMsg() { document.getElementById('msg').style.display = 'none'; }

  function setBusy(btnId, txt, ocupado) {
    var btn = document.getElementById(btnId);
    btn.disabled = ocupado; btn.textContent = txt;
  }

  async function redirecionarPosLogin(token) {
    localStorage.setItem('jubilados_token', token);
    try {
      var res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) { window.location.href = '/operacoes/emitir-nfe'; return; }
      var perfil = await res.json();
      window.location.href = perfil.onboardingConcluido ? '/operacoes/emitir-nfe' : '/onboarding';
    } catch(e) {
      window.location.href = '/operacoes/emitir-nfe';
    }
  }

  async function entrar() {
    var email = document.getElementById('login-email').value.trim();
    var senha = document.getElementById('login-senha').value;
    if (!email || !senha) { mostrarMsg('Preencha e-mail e senha.', 'error'); return; }

    setBusy('btn-login', 'Entrando...', true);
    try {
      var res  = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, senha: senha })
      });
      var data = await res.json();
      if (!res.ok) { mostrarMsg(data.error || 'Erro ao fazer login.', 'error'); return; }
      await redirecionarPosLogin(data.token);
    } catch(e) {
      mostrarMsg('Falha de rede. Verifique a conexao.', 'error');
    } finally {
      setBusy('btn-login', 'Entrar', false);
    }
  }

  async function cadastrar() {
    var email    = document.getElementById('cad-email').value.trim();
    var senha    = document.getElementById('cad-senha').value;
    var confirma = document.getElementById('cad-confirma').value;
    if (!email || !senha) { mostrarMsg('Preencha todos os campos.', 'error'); return; }
    if (senha !== confirma) { mostrarMsg('As senhas nao coincidem.', 'error'); return; }
    if (senha.length < 6)  { mostrarMsg('A senha deve ter ao menos 6 caracteres.', 'error'); return; }

    setBusy('btn-cadastro', 'Criando...', true);
    try {
      var res  = await fetch('/api/auth/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, senha: senha })
      });
      var data = await res.json();
      if (!res.ok) { mostrarMsg(data.error || 'Erro ao criar conta.', 'error'); return; }
      await redirecionarPosLogin(data.token);
    } catch(e) {
      mostrarMsg('Falha de rede. Verifique a conexao.', 'error');
    } finally {
      setBusy('btn-cadastro', 'Criar conta', false);
    }
  }

  async function recuperarSenha() {
    var email = document.getElementById('forgot-email').value.trim();
    if (!email) { mostrarMsg('Digite seu e-mail.', 'error'); return; }

    setBusy('btn-forgot', 'Enviando...', true);
    try {
      var res  = await fetch('/api/auth/recuperar-senha', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      });
      var data = await res.json();
      mostrarMsg(data.message || 'Se o e-mail existir, um link sera enviado.', 'success');
    } catch(e) {
      mostrarMsg('Falha de rede.', 'error');
    } finally {
      setBusy('btn-forgot', 'Enviar link de redefini\u00e7\u00e3o', false);
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-login').style.display    !== 'none') entrar();
    if (document.getElementById('panel-cadastro').style.display !== 'none') cadastrar();
    if (document.getElementById('panel-forgot').style.display   !== 'none') recuperarSenha();
  });
</script>
</body>
</html>
